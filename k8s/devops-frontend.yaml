apiVersion: apps/v1
kind: Service
metadata:
  name: sk044-devops-frontend
  namespace: class-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devops-frontend
  template:
    metadata:
      labels:
        app: devops-frontend
    spec:
      imagePullSecrets:
        - name: sk044-harbor-secret
      containers:
        - name: devops-frontend
          image: amdp-registry.skala-ai.com/skala26a-ai2/sk044-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501

---
apiVersion: v1
kind: Service
metadata:
  name: devops-frontend-service
  namespace: class-2
spec:
  selector:
    app: devops-frontend
  ports:
    - port: 8501
      targetPort: 8501
  type: NodePort