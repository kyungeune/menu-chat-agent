name: CI-CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: amdp-registry.skala-ai.com/skala26a-ai2/sk044-frontend:latest
  REGISTRY_URL: amdp-registry.skala-ai.com
  NAMESPACE: class-2
  DEPLOYMENT_NAME: sk044-devops-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/sk044-devops-frontend.yaml --validate=false
          kubectl rollout restart deployment $DEPLOYMENT_NAME -n $NAMESPACE
          kubectl rollout status deployment $DEPLOYMENT_NAME -n $NAMESPACE --timeout=120s